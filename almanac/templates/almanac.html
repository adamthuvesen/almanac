<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Almanac</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,200..900,0..100,0..1&family=Geist+Mono:wght@300..800&family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@300..800&display=swap">

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6"></script>

<style>
  :root {
    --cream: #F4EDE0;
    --ink:   #1C1612;
    --rust:  #A94F2E;
    --sage:  #5B6A47;
    --ochre: #C9A24A;
    --plum:  #4A2E3B;
    --wonk: 0;
  }

  * { box-sizing: border-box; }

  html {
    scroll-behavior: auto;
    background: var(--cream);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }

  body {
    margin: 0;
    font-family: "Inter Tight", system-ui, sans-serif;
    background: var(--cream);
    color: var(--ink);
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='7'/><feColorMatrix values='0 0 0 0 0.11  0 0 0 0 0.09  0 0 0 0 0.07  0 0 0 0.55 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.18'/></svg>");
    background-size: 220px 220px;
    background-attachment: fixed;
    background-blend-mode: multiply;
  }

  .display {
    font-family: "Fraunces", "Times New Roman", serif;
    font-variation-settings: "opsz" 144, "SOFT" 100, "WONK" var(--wonk);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 0.95;
  }
  .mono   { font-family: "Geist Mono", ui-monospace, monospace; }
  .prose  { font-family: "Instrument Serif", "Times New Roman", serif; font-style: italic; }
  .ui     { font-family: "Inter Tight", system-ui, sans-serif; }

  .slide {
    min-height: 100vh;
    height: 100vh;
    padding: 6vh 8vw;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    background-color: var(--slide-bg, var(--cream));
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='7'/><feColorMatrix values='0 0 0 0 0.11  0 0 0 0 0.09  0 0 0 0 0.07  0 0 0 0 0.55 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.18'/></svg>");
    background-size: 220px 220px;
    background-blend-mode: overlay;
    color: var(--slide-fg, var(--ink));
    border-bottom: 1px solid rgba(28,22,18,0.05);
    overflow: hidden;
  }

  .eyebrow {
    font-family: "Inter Tight", system-ui, sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 12px;
    color: var(--slide-accent, var(--plum));
    margin-bottom: 1.6em;
  }

  /* Cover / Closer */
  .cover-title {
    font-size: clamp(56px, 10vw, 140px);
    overflow-wrap: anywhere;
    max-width: 100%;
  }
  .cover-meta {
    margin-top: 2.4rem;
    display: flex;
    gap: 2rem;
    align-items: baseline;
    flex-wrap: wrap;
  }
  .cover-meta .label { font-size: 14px; color: var(--slide-accent, var(--plum)); text-transform: uppercase; letter-spacing: 0.12em; }
  .cover-meta .value { font-size: 18px; }
  .cover-tag { font-size: clamp(20px, 2.2vw, 28px); margin-top: 1.6rem; color: var(--rust); }

  /* Year in Numbers */
  .grid6 {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 1.6vh 4vw;
    margin-top: 1rem;
  }
  .stat .figure {
    font-family: "Geist Mono", ui-monospace, monospace;
    font-weight: 600;
    font-size: clamp(40px, 6vw, 88px);
    color: inherit;
    line-height: 1;
    overflow-wrap: anywhere;
  }
  .stat .label {
    font-family: "Inter Tight", system-ui, sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-size: 12px;
    color: var(--slide-accent, var(--plum));
    margin-top: 0.6rem;
  }

  /* Section title */
  h2.section {
    font-family: "Fraunces", serif;
    font-variation-settings: "opsz" 144, "SOFT" 80, "WONK" var(--wonk);
    font-weight: 700;
    font-size: clamp(48px, 7vw, 110px);
    line-height: 0.95;
    margin: 0 0 1rem 0;
    letter-spacing: -0.02em;
  }

  /* charts */
  .chart-wrap { width: 100%; max-width: 1400px; margin-top: 1rem; }
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4vw;
    align-items: start;
  }
  @media (max-width: 900px) { .charts-row { grid-template-columns: 1fr; } }

  /* Stacked bar */
  .stack-bar {
    display: flex;
    width: 100%;
    height: 64px;
    border-radius: 6px;
    overflow: hidden;
    margin-top: 1.5rem;
    background: rgba(28,22,18,0.06);
  }
  .stack-bar > div {
    height: 100%;
    width: 0;
    transition: width 0.6s cubic-bezier(.6,.05,.2,1);
  }
  .stack-legend {
    margin-top: 1.2rem;
    display: flex;
    flex-wrap: wrap;
    gap: 1.2rem 2rem;
    font-family: "Inter Tight", sans-serif;
    font-size: 14px;
  }
  .stack-legend .swatch {
    display: inline-block;
    width: 12px; height: 12px;
    border-radius: 2px;
    margin-right: 0.5rem;
    vertical-align: middle;
  }
  .stack-legend .pct {
    font-family: "Geist Mono", monospace;
    color: var(--slide-accent, var(--plum));
    margin-left: 0.4rem;
  }

  /* Lang ranked list */
  .ranked {
    margin-top: 2rem;
    border-top: 1px solid rgba(28,22,18,0.12);
  }
  .ranked .row {
    display: grid;
    grid-template-columns: 60px 1fr 120px 80px;
    gap: 1.4rem;
    padding: 0.8rem 0;
    border-bottom: 1px solid rgba(28,22,18,0.08);
    align-items: baseline;
  }
  .ranked .rank { font-family: "Geist Mono", monospace; color: var(--slide-accent, var(--plum)); }
  .ranked .name { font-family: "Instrument Serif", serif; font-style: italic; font-size: 22px; }
  .ranked .num  { font-family: "Geist Mono", monospace; text-align: right; }
  .ranked .num.added   { color: var(--sage); }
  .ranked .num.removed { color: var(--slide-accent, var(--plum)); }
  .ranked .num.commits { color: var(--rust); }

  .author-row {
    display: grid;
    grid-template-columns: 60px 56px 1fr 120px 100px 100px;
    gap: 1rem;
    padding: 0.9rem 0;
    border-bottom: 1px solid rgba(28,22,18,0.08);
    align-items: center;
  }
  .author-row .avatar {
    width: 48px; height: 48px;
    border-radius: 50%;
    object-fit: cover;
    background: var(--slide-fg, var(--ink));
    color: var(--slide-bg, var(--cream));
    display: flex; align-items: center; justify-content: center;
    font-family: "Geist Mono", monospace;
    font-size: 14px;
  }

  /* First commit narrative */
  .narrative {
    max-width: 1200px;
  }
  .narrative .caption { font-size: 24px; color: var(--rust); margin-bottom: 1.4rem; }
  .narrative .subject {
    font-family: "Fraunces", serif;
    font-variation-settings: "opsz" 144, "SOFT" 60, "WONK" var(--wonk);
    font-weight: 700;
    font-size: clamp(40px, 6vw, 84px);
    line-height: 1.0;
    margin-bottom: 1.6rem;
    color: inherit;
  }
  .narrative .meta {
    font-family: "Geist Mono", monospace;
    color: var(--slide-accent, var(--plum));
    font-size: 14px;
    display: flex; gap: 2rem; flex-wrap: wrap;
  }

  .tagline {
    margin-top: 2rem;
    font-family: "Instrument Serif", serif;
    font-style: italic;
    font-size: clamp(24px, 3vw, 36px);
    color: var(--slide-accent, var(--plum));
    max-width: 60ch;
  }

  /* Top-files horizontal bar list */
  .file-bars { margin-top: 1.5rem; }
  .file-bars .row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 80px;
    gap: 1.2rem;
    padding: 0.5rem 0;
    align-items: center;
  }
  .file-bars .path {
    font-family: "Geist Mono", monospace;
    font-size: 13px;
    color: inherit;
    overflow: hidden;
    text-overflow: ellipsis;
    direction: rtl;
    text-align: left;
    white-space: nowrap;
  }
  .file-bars .bar-track { background: rgba(28,22,18,0.06); height: 18px; border-radius: 3px; overflow: hidden; }
  .file-bars .bar { background: var(--slide-accent, var(--plum)); height: 100%; width: 0; transition: width 0.6s cubic-bezier(.5,.05,.2,1); }
  .file-bars .edits { font-family: "Geist Mono", monospace; text-align: right; color: var(--rust); }
  .file-bars .row.has-bar { grid-template-columns: 320px 1fr 80px; }

  .footnote {
    margin-top: 2rem;
    font-family: "Inter Tight", sans-serif;
    font-size: 13px;
    color: var(--slide-accent, var(--plum));
    opacity: 0.7;
  }

  .heatmap-wrap { margin-top: 2rem; overflow-x: auto; }
  .heatmap-wrap svg { max-width: 100%; height: auto; }

  /* Plot tweaks */
  figure { margin: 0; }

  /* Dark-slide overrides — bar tracks and dividers adapt to light-on-dark */
  .slide .stack-bar    { background: rgba(244, 237, 224, 0.12); }
  .slide .bar-track    { background: rgba(244, 237, 224, 0.10); }
  .slide .ranked       { border-top-color:    rgba(244, 237, 224, 0.12); }
  .slide .ranked .row  { border-bottom-color: rgba(244, 237, 224, 0.08); }
  .slide .author-row   { border-bottom-color: rgba(244, 237, 224, 0.08); }
</style>
</head>
<body>

<script id="almanac-bundle" type="application/json">$BUNDLE_JSON</script>

<main id="root"></main>

<script type="module">
  const BUNDLE = JSON.parse(document.getElementById("almanac-bundle").textContent);
  window.BUNDLE = BUNDLE;

  // Palette
  const C = {
    cream: "#F4EDE0", ink: "#1C1612", rust: "#A94F2E",
    sage:  "#5B6A47", ochre: "#C9A24A", plum: "#4A2E3B",
  };

  // Utilities
  const fmt = new Intl.NumberFormat("en-US");
  const escapeHtml = (s) =>
    String(s ?? "").replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
    }[c]));

  const fmtDate = (iso) => {
    if (!iso) return "";
    try {
      const d = new Date(iso);
      return d.toLocaleDateString("en-US", {
        year: "numeric", month: "long", day: "numeric",
      });
    } catch { return iso; }
  };

  const DOW = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const VERB_COLOR = {
    feat: C.sage, fix: C.rust, chore: C.ochre, docs: "#7B9EC8",
    refactor: C.rust, test: C.cream, style: C.sage, perf: C.ochre,
    build: "#B896C8", ci: C.sage, revert: C.rust,
    unclear: "rgba(244, 237, 224, 0.30)",
  };
  const LANG_PALETTE = [C.rust, C.sage, C.ochre, C.plum, C.ink];
  const LANG_PALETTE_DARK = [C.rust, C.sage, C.ochre, "#5B9E6A", C.cream];

  const THEMES = {
    cover:          { bg: "#1D3327", fg: C.cream, accent: "#7EC8A0" },
    "first-commit": { bg: "#12162B", fg: C.cream, accent: C.ochre   },
    numbers:        { bg: "#2B1608", fg: C.cream, accent: C.cream   },
    heatmap:        { bg: "#0D1F2D", fg: C.cream, accent: "#5B8FA0" },
    cadence:        { bg: "#221900", fg: C.cream, accent: C.ochre   },
    "top-files":    { bg: "#1A1A1E", fg: C.cream, accent: C.rust    },
    languages:      { bg: "#0F1E14", fg: C.cream, accent: "#5B9E6A" },
    verbs:          { bg: "#2B0A0A", fg: C.cream, accent: "#CF6B5E" },
    authors:        { bg: "#1C0E26", fg: C.cream, accent: "#9B6FAB" },
    closer:         { bg: "#1D3327", fg: C.cream, accent: "#7EC8A0" },
  };

  // Slide builder helpers
  const root = document.getElementById("root");
  const make = (tag, attrs = {}, html = "") => {
    const el = document.createElement(tag);
    for (const [k, v] of Object.entries(attrs)) {
      if (k === "class") el.className = v;
      else if (k === "style") el.style.cssText = v;
      else el.setAttribute(k, v);
    }
    if (html) el.innerHTML = html;
    return el;
  };
  const slide = (id, inner, theme = null) => {
    const s = make("section", { class: "slide", id });
    s.innerHTML = inner;
    if (theme) {
      s.style.setProperty("--slide-bg",     theme.bg);
      s.style.setProperty("--slide-fg",     theme.fg ?? C.cream);
      s.style.setProperty("--slide-accent", theme.accent);
    }
    root.appendChild(s);
    return s;
  };

  function letterSpans(text) {
    return [...String(text)].map((ch) => {
      if (ch === " ") return `<span class="ch">&nbsp;</span>`;
      return `<span class="ch" style="display:inline-block">${escapeHtml(ch)}</span>`;
    }).join("");
  }

  // ── Cover ──────────────────────────────────────────────────────────────
  const coverCount = BUNDLE.commit_count ?? 0;
  slide("cover", `
    <div class="eyebrow ui">Almanac</div>
    <div class="display cover-title">${letterSpans(BUNDLE.repo?.name || "repo")}</div>
    <div class="cover-meta">
      <div><div class="label">Window</div><div class="value mono">${escapeHtml(BUNDLE.window?.label || "")}</div></div>
      <div><div class="label">Commits</div><div class="value mono">${fmt.format(coverCount)}</div></div>
      <div><div class="label">HEAD</div><div class="value mono">${escapeHtml((BUNDLE.repo?.head_sha || "").slice(0,7))}</div></div>
    </div>
    <div class="cover-tag prose">A year in commits — scroll to begin.</div>
  `, THEMES.cover);

  // ── First Commit ───────────────────────────────────────────────────────
  if (BUNDLE.first_commit) {
    const fc = BUNDLE.first_commit;
    slide("first-commit", `
      <div class="narrative">
        <div class="eyebrow ui">First Commit</div>
        <div class="caption prose">The year began here.</div>
        <div class="subject">${escapeHtml(fc.subject || "")}</div>
        <div class="meta">
          <div><span style="opacity:.6">author</span> ${escapeHtml(fc.author || "")}</div>
          <div><span style="opacity:.6">date</span> ${escapeHtml(fmtDate(fc.ts))}</div>
          <div><span style="opacity:.6">sha</span> ${escapeHtml((fc.sha || "").slice(0,7))}</div>
        </div>
      </div>
    `, THEMES["first-commit"]);
  }

  // ── Year in Numbers ────────────────────────────────────────────────────
  const stats = [
    ["Commits",         BUNDLE.commit_count ?? 0],
    ["Lines added",     BUNDLE.lines_added ?? 0],
    ["Lines removed",   BUNDLE.lines_removed ?? 0],
    ["Longest streak",  BUNDLE.longest_streak_days ?? 0],
    ["Longest gap",     BUNDLE.longest_gap_days ?? 0],
    ["Biggest commit",  BUNDLE.biggest_commit?.delta ?? 0],
  ];
  slide("numbers", `
    <div class="eyebrow ui">Year in Numbers</div>
    <h2 class="section display">By the numbers.</h2>
    <div class="grid6">
      ${stats.map(([label, value]) => `
        <div class="stat">
          <div class="figure" data-target="${value}">0</div>
          <div class="label">${escapeHtml(label)}</div>
        </div>
      `).join("")}
    </div>
  `, THEMES.numbers);

  // ── Calendar Heatmap ───────────────────────────────────────────────────
  if (Array.isArray(BUNDLE.commits_per_day) && BUNDLE.commits_per_day.length > 0) {
    slide("heatmap", `
      <div class="eyebrow ui">Calendar Heatmap</div>
      <h2 class="section display">Day by day.</h2>
      <div class="heatmap-wrap" id="heatmap-target"></div>
      <div class="footnote ui">One cell per day. Cream = no commits. Rust = busiest.</div>
    `, THEMES.heatmap);
  }

  // ── Cadence ────────────────────────────────────────────────────────────
  slide("cadence", `
    <div class="eyebrow ui">Commit Cadence</div>
    <h2 class="section display">When you ship.</h2>
    <div class="charts-row">
      <div>
        <div class="ui" style="font-size:13px;color:var(--plum);text-transform:uppercase;letter-spacing:.14em;margin-bottom:.6rem">By weekday</div>
        <div id="dow-chart" class="chart-wrap"></div>
      </div>
      <div>
        <div class="ui" style="font-size:13px;color:var(--plum);text-transform:uppercase;letter-spacing:.14em;margin-bottom:.6rem">By hour</div>
        <div id="hour-chart" class="chart-wrap"></div>
      </div>
    </div>
  `, THEMES.cadence);

  // ── Top Files ──────────────────────────────────────────────────────────
  const filesRaw = (BUNDLE.files_by_churn || []).slice(0, 15);
  if (filesRaw.length > 0) {
    const maxEdits = Math.max(...filesRaw.map((f) => f.edits || 0), 1);
    slide("top-files", `
      <div class="eyebrow ui">Top Files</div>
      <h2 class="section display">Most touched.</h2>
      <div class="file-bars">
        ${filesRaw.map((f) => `
          <div class="row has-bar">
            <div class="path" title="${escapeHtml(f.path)}">${escapeHtml(f.path)}</div>
            <div class="bar-track"><div class="bar" data-pct="${(f.edits / maxEdits) * 100}"></div></div>
            <div class="edits">${fmt.format(f.edits)}</div>
          </div>
        `).join("")}
      </div>
    `, THEMES["top-files"]);
  }

  // ── Languages ──────────────────────────────────────────────────────────
  const langs = (BUNDLE.languages || []).filter((l) => (l.lines ?? 0) > 0);
  if (langs.length > 0) {
    const total = langs.reduce((a, l) => a + l.lines, 0);
    const top = langs.slice(0, 8);
    slide("languages", `
      <div class="eyebrow ui">Languages</div>
      <h2 class="section display">In which tongues.</h2>
      <div class="stack-bar" id="lang-bar">
        ${top.map((l, i) => `
          <div data-target-pct="${(l.lines / total) * 100}" style="background:${LANG_PALETTE_DARK[i % LANG_PALETTE_DARK.length]}"></div>
        `).join("")}
      </div>
      <div class="stack-legend">
        ${top.map((l, i) => `
          <span><span class="swatch" style="background:${LANG_PALETTE_DARK[i % LANG_PALETTE_DARK.length]}"></span>
          ${escapeHtml(l.ext || "(none)")}<span class="pct">${(l.lines / total * 100).toFixed(1)}%</span></span>
        `).join("")}
      </div>
      <div class="ranked">
        ${langs.slice(0, 10).map((l, i) => `
          <div class="row">
            <div class="rank">#${String(i + 1).padStart(2, "0")}</div>
            <div class="name">${escapeHtml(l.ext || "(none)")}</div>
            <div class="num">${fmt.format(l.lines)}</div>
            <div class="num">${(l.lines / total * 100).toFixed(1)}%</div>
          </div>
        `).join("")}
      </div>
    `, THEMES.languages);
  }

  // ── Verbs ──────────────────────────────────────────────────────────────
  const verbsObj = BUNDLE.verbs || {};
  const verbsArr = Object.entries(verbsObj)
    .filter(([_, n]) => n > 0)
    .map(([verb, n]) => ({ verb, n }))
    .sort((a, b) => b.n - a.n);
  if (verbsArr.length > 0) {
    const totalV = verbsArr.reduce((a, v) => a + v.n, 0);
    const top1 = verbsArr[0]?.verb;
    const top2 = verbsArr[1]?.verb;
    let tagline;
    if (top1 && top2) {
      tagline = `Mostly <code>${escapeHtml(top1)}</code>-ing, a little <code>${escapeHtml(top2)}</code>-ing.`;
    } else if (top1) {
      tagline = `Mostly <code>${escapeHtml(top1)}</code>-ing.`;
    } else {
      tagline = "A quiet year.";
    }
    slide("verbs", `
      <div class="eyebrow ui">Commit Verbs</div>
      <h2 class="section display">What you did.</h2>
      <div class="stack-bar" id="verb-bar">
        ${verbsArr.map((v) => `
          <div data-target-pct="${(v.n / totalV) * 100}" style="background:${VERB_COLOR[v.verb] || C.ink}"></div>
        `).join("")}
      </div>
      <div class="stack-legend">
        ${verbsArr.map((v) => `
          <span><span class="swatch" style="background:${VERB_COLOR[v.verb] || C.ink}"></span>
          ${escapeHtml(v.verb)}<span class="pct">${(v.n / totalV * 100).toFixed(1)}%</span></span>
        `).join("")}
      </div>
      <div class="tagline">${tagline}</div>
    `, THEMES.verbs);
  }

  // ── Authors ────────────────────────────────────────────────────────────
  const authors = BUNDLE.authors || [];
  if (authors.length > 0) {
    const top10 = authors.slice(0, 10);
    const more = Math.max(0, authors.length - 10);
    const authorsSlide = slide("authors", `
      <div class="eyebrow ui">Authors</div>
      <h2 class="section display">Whose hands.</h2>
      <div class="authors-list">
        ${top10.map((a, i) => {
          const initials = (a.name || "?").split(/\s+/).map(s => s[0] || "").join("").slice(0,2).toUpperCase();
          const hash = a.avatar_hash || "";
          return `
            <div class="author-row">
              <div class="rank mono">#${String(i + 1).padStart(2, "0")}</div>
              <div class="avatar-slot" data-hash="${escapeHtml(hash)}" data-initials="${escapeHtml(initials)}"></div>
              <div class="name prose" style="font-size:24px">${escapeHtml(a.name || "Unknown")}</div>
              <div class="num commits mono" style="text-align:right">${fmt.format(a.commits)} commits</div>
              <div class="num added mono" style="text-align:right">+${fmt.format(a.lines_added)}</div>
              <div class="num removed mono" style="text-align:right">−${fmt.format(a.lines_removed)}</div>
            </div>
          `;
        }).join("")}
      </div>
      ${more > 0 ? `<div class="footnote ui">…and ${more} more.</div>` : ""}
    `, THEMES.authors);
    // Hydrate avatar slots with DOM APIs (no inline event handlers, no
    // user data inside HTML attributes that would be parsed as JS).
    authorsSlide.querySelectorAll(".avatar-slot").forEach((slot) => {
      const hash = slot.dataset.hash || "";
      const initials = slot.dataset.initials || "";
      const initialsDiv = document.createElement("div");
      initialsDiv.className = "avatar";
      initialsDiv.textContent = initials;
      if (hash) {
        const img = document.createElement("img");
        img.className = "avatar";
        img.alt = "";
        img.src = `https://www.gravatar.com/avatar/${hash}?d=404&s=96`;
        img.addEventListener("error", () => img.replaceWith(initialsDiv));
        slot.replaceWith(img);
      } else {
        slot.replaceWith(initialsDiv);
      }
    });
  }

  // ── Closer ─────────────────────────────────────────────────────────────
  slide("closer", `
    <div class="eyebrow ui">Fin</div>
    <div class="display cover-title">See you next year.</div>
    <div class="cover-tag prose">Until then — keep shipping.</div>
    <div class="cover-meta">
      <div><div class="label">Window</div><div class="value mono">${escapeHtml(BUNDLE.window?.label || "")}</div></div>
      <div><div class="label">HEAD</div><div class="value mono">${escapeHtml((BUNDLE.repo?.head_sha || "").slice(0,7))}</div></div>
    </div>
  `, THEMES.closer);

  // ── Plot rendering ─────────────────────────────────────────────────────
  function renderHeatmap() {
    const target = document.getElementById("heatmap-target");
    if (!target || !window.Plot) return;
    const data = (BUNDLE.commits_per_day || []).map((d) => {
      const dt = new Date(d.date + "T00:00:00");
      return {
        date: dt,
        week: d3.utcMonday(dt),
        dow: ((dt.getDay() + 6) % 7), // Mon=0..Sun=6
        count: d.count,
      };
    });
    if (!data.length) return;
    const maxCount = Math.max(...data.map((d) => d.count), 1);
    const plot = Plot.plot({
      padding: 0.06,
      width: Math.min(1400, target.clientWidth || 1200),
      height: 220,
      marginLeft: 40,
      x: { axis: null },
      y: {
        domain: [0, 1, 2, 3, 4, 5, 6],
        tickFormat: (i) => DOW[i],
        tickSize: 0,
        label: null,
      },
      color: {
        type: "linear",
        domain: [0, maxCount],
        interpolate: d3.interpolateRgbBasis([C.cream, C.sage, C.ochre, C.rust]),
        legend: true,
      },
      marks: [
        Plot.cell(data, {
          x: "week",
          y: "dow",
          fill: "count",
          inset: 1,
          rx: 2,
        }),
      ],
      style: { background: "transparent", color: C.cream, fontFamily: "Geist Mono, monospace", fontSize: 11 },
    });
    target.append(plot);
  }

  function renderBar(targetId, data, labels, fill = C.rust, labelColor = C.ink) {
    const target = document.getElementById(targetId);
    if (!target || !window.Plot) return;
    const rows = data.map((v, i) => ({ k: labels[i], v }));
    const plot = Plot.plot({
      width: Math.min(700, target.clientWidth || 600),
      height: 280,
      marginBottom: 40,
      marginLeft: 40,
      x: { label: null, tickRotate: 0, type: "band", domain: labels },
      y: { grid: true, label: null, tickSize: 0 },
      style: { background: "transparent", color: labelColor, fontFamily: "Geist Mono, monospace", fontSize: 11 },
      marks: [
        Plot.barY(rows, { x: "k", y: "v", fill, rx: 2 }),
      ],
    });
    target.append(plot);
  }

  // ── Animations ─────────────────────────────────────────────────────────
  function setupAnimations() {
    if (!window.gsap || !window.ScrollTrigger) return;
    gsap.registerPlugin(ScrollTrigger);

    // Cover letter reveal — fromTo ensures elements are always visible at end,
    // even if a teleport / deep link skips the trigger window.
    document.querySelectorAll(".cover-title .ch, h2.section, .narrative .subject").forEach((el) => {
      gsap.fromTo(el,
        { y: 24, opacity: 0 },
        {
          y: 0, opacity: 1, duration: 0.6, ease: "power3.out",
          scrollTrigger: { trigger: el, start: "top 90%", once: true },
          immediateRender: false,
        }
      );
    });

    // Counter-ups — animate on enter; fall back to final value if untriggered.
    document.querySelectorAll(".stat .figure").forEach((el) => {
      const target = parseFloat(el.dataset.target) || 0;
      const obj = { v: 0 };
      let played = false;
      gsap.to(obj, {
        v: target,
        duration: 1.6,
        ease: "power2.out",
        scrollTrigger: { trigger: el, start: "top 85%", once: true, onEnter: () => { played = true; } },
        onUpdate: () => { el.textContent = fmt.format(Math.round(obj.v)); },
      });
      setTimeout(() => { if (!played) el.textContent = fmt.format(target); }, 1500);
    });

    // Stacked bars (languages, verbs) — staggered grow on enter, but always
    // settle at full width so deep-links never see empty bars.
    ["lang-bar", "verb-bar"].forEach((id) => {
      const bar = document.getElementById(id);
      if (!bar) return;
      const fill = (animated) => {
        [...bar.children].forEach((seg, i) => {
          const pct = parseFloat(seg.dataset.targetPct) || 0;
          if (animated) setTimeout(() => { seg.style.width = pct + "%"; }, i * 80);
          else seg.style.width = pct + "%";
        });
      };
      let triggered = false;
      ScrollTrigger.create({
        trigger: bar, start: "top 85%", once: true,
        onEnter: () => { triggered = true; fill(true); },
      });
      // Fallback: settle to final state after a short delay regardless.
      setTimeout(() => { if (!triggered) fill(false); }, 1200);
    });

    // Top files bars — same pattern.
    const fileBars = document.querySelectorAll("#top-files .bar");
    fileBars.forEach((el, i) => {
      const pct = parseFloat(el.dataset.pct) || 0;
      let triggered = false;
      ScrollTrigger.create({
        trigger: el, start: "top 90%", once: true,
        onEnter: () => { triggered = true; setTimeout(() => { el.style.width = pct + "%"; }, i * 40); },
      });
      setTimeout(() => { if (!triggered) el.style.width = pct + "%"; }, 1200);
    });

    // Charts render eagerly so deep-link/teleport navigation always shows them.
    renderBar("dow-chart", BUNDLE.by_dow || [], DOW, C.rust, C.cream);
    renderBar("hour-chart", BUNDLE.by_hour || [], Array.from({length:24}, (_,i)=>String(i).padStart(2,"0")), C.sage, C.cream);
    renderHeatmap();

    // WONK wiggle on scroll
    let ticking = false;
    function updateWonk() {
      ticking = false;
      const y = window.scrollY;
      const wonk = (Math.sin(y / 500) + 1) / 2; // 0..1
      document.documentElement.style.setProperty("--wonk", wonk.toFixed(3));
    }
    window.addEventListener("scroll", () => {
      if (!ticking) { requestAnimationFrame(updateWonk); ticking = true; }
    }, { passive: true });
    updateWonk();
  }

  // GSAP loads via CDN; if blocked, just set final values so the page is still readable.
  function fallbackNoAnim() {
    document.querySelectorAll(".stat .figure").forEach((el) => {
      const t = parseFloat(el.dataset.target) || 0;
      el.textContent = fmt.format(t);
    });
    document.querySelectorAll("#lang-bar > div, #verb-bar > div").forEach((seg) => {
      const pct = parseFloat(seg.dataset.targetPct) || 0;
      seg.style.width = pct + "%";
    });
    document.querySelectorAll(".file-bars .bar").forEach((el) => {
      const pct = parseFloat(el.dataset.pct) || 0;
      el.style.width = pct + "%";
    });
    if (window.Plot) {
      renderBar("dow-chart", BUNDLE.by_dow || [], DOW, C.rust, C.cream);
      renderBar("hour-chart", BUNDLE.by_hour || [], Array.from({length:24}, (_,i)=>String(i).padStart(2,"0")), C.sage, C.cream);
      renderHeatmap();
    }
  }

  if (window.gsap && window.ScrollTrigger) {
    setupAnimations();
  } else {
    window.addEventListener("load", () => {
      if (window.gsap && window.ScrollTrigger) setupAnimations();
      else fallbackNoAnim();
    });
  }

  // ── Snap navigation: one wheel/key/swipe gesture = one section ─────────
  function setupSnapNav() {
    const sections = [...document.querySelectorAll("section.slide")];
    if (sections.length === 0) return;

    let current = 0;
    let locked = false;
    const COOLDOWN_MS = 850;

    function indexNearestToScroll() {
      const y = window.scrollY + window.innerHeight / 2;
      let best = 0, bestDist = Infinity;
      sections.forEach((s, i) => {
        const center = s.offsetTop + s.offsetHeight / 2;
        const dist = Math.abs(center - y);
        if (dist < bestDist) { bestDist = dist; best = i; }
      });
      return best;
    }

    function goTo(i) {
      i = Math.max(0, Math.min(sections.length - 1, i));
      if (i === current && !locked) {
        // already there — still smooth-correct any drift
      }
      current = i;
      locked = true;
      sections[i].scrollIntoView({ behavior: "smooth", block: "start" });
      setTimeout(() => { locked = false; }, COOLDOWN_MS);
    }

    function step(dir) {
      if (locked) return;
      const here = indexNearestToScroll();
      goTo(here + dir);
    }

    // Wheel — collapse a whole gesture into one step
    window.addEventListener("wheel", (e) => {
      e.preventDefault();
      if (locked) return;
      if (Math.abs(e.deltaY) < 8) return;
      step(e.deltaY > 0 ? 1 : -1);
    }, { passive: false });

    // Keys
    window.addEventListener("keydown", (e) => {
      switch (e.key) {
        case "ArrowDown":
        case "PageDown":
        case " ":
        case "j":
          e.preventDefault(); step(1); break;
        case "ArrowUp":
        case "PageUp":
        case "k":
          e.preventDefault(); step(-1); break;
        case "Home":
          e.preventDefault(); goTo(0); break;
        case "End":
          e.preventDefault(); goTo(sections.length - 1); break;
      }
    });

    // Touch swipe
    let touchStartY = null;
    window.addEventListener("touchstart", (e) => {
      touchStartY = e.touches[0].clientY;
    }, { passive: true });
    window.addEventListener("touchend", (e) => {
      if (touchStartY == null) return;
      const dy = touchStartY - e.changedTouches[0].clientY;
      if (Math.abs(dy) > 40) step(dy > 0 ? 1 : -1);
      touchStartY = null;
    }, { passive: true });

    // Sync `current` if user lands deep-linked
    current = indexNearestToScroll();
    // Settle position to the nearest snap on load.
    requestAnimationFrame(() => goTo(current));
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", setupSnapNav);
  } else {
    setupSnapNav();
  }
</script>

</body>
</html>
